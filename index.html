<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Presentation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="presentation-container">
        <section class="slide active">
            <div class="content">
                <h1>次世代のプレゼンテーション</h1>
                <p>HTML / CSS / JS で作る自由な表現</p>
                <div class="decorative-box"></div>
            </div>
        </section>

        <section class="slide">
            <div class="content">
                <h2>動的なアニメーション</h2>
                <ul>
                    <li class="fade-in-item">CSS Transitions による滑らかな移動</li>
                    <li class="fade-in-item">JavaScript による状態管理</li>
                    <li class="fade-in-item">レスポンシブなデザイン</li>
                </ul>
            </div>
        </section>

        <section class="slide">
            <div class="content">
                <h2>数式やコードの統合</h2>
                <p>LaTeX形式の数式や、シンタックスハイライトも自由自在です。</p>
                <div class="code-block">
                    <code>console.log("Hello, Presentation!");</code>
                </div>
            </div>
        </section>
    </div>

    <div class="controls">
        <button id="prevBtn">← 前へ</button>
        <span id="slideNum">1 / 3</span>
        <button id="nextBtn">次へ →</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
